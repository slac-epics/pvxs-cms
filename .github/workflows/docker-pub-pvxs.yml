          no-cache: true
          build-args: |
            DOCKER_USERNAME=${{ vars.DOCKER_USERNAME }}
            BASE_IMAGE=lab_base
            BASE_IMAGE_TAG=latest
            RELATIVE_DOCKER_DIR=example/kubernetes/docker/gateway
