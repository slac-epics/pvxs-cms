# .github/workflows/ci-scripts-build.yml for use with EPICS Base ci-scripts
# (see: https://github.com/epics-base/ci-scripts)

# Workflow to build:
# - authnstd (all platforms)
# - authnkrb (Linux, OSX, Windows, mingw - NOT RTEMS)
# - authnldap (Linux, OSX, Windows, mingw - NOT RTEMS)
# - pvxcert (all platforms)
# - pvacms (Linux, OSX only)
# - tests (all platforms)

# This is YAML - indentation levels are crucial

name: PVXS CMS Build

# Trigger on pushes and PRs to any branch
on:
  push:
    paths-ignore:
      - .appveyor.yml
      - MANIFEST.in
  pull_request:
  workflow_dispatch:

env:
  SETUP_PATH: .ci-local
  _PVXS_ABORT_ON_CRIT: 1
  PVXS_LOG: pvxs.*=WARN
  OPENSSL_VERSION: "3.1.4"

jobs:
  # Native builds (Linux, OSX, Windows)
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      SET: ${{ matrix.set || 'defaults' }}
      CMP: ${{ matrix.cmp }}
      BCFG: ${{ matrix.configuration }}
      BASE: ${{ matrix.base }}
      CI_CROSS_TARGETS: ${{ matrix.cross }}
      LIBEVENT_TAG: ${{ matrix.libevent }}
      TEST: ${{ matrix.test }}
      EXTRA: ${{ matrix.extra }}
      VV: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux with gcc - builds everything including pvacms and tests
          - name: Linux (gcc)
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          # Linux with clang - builds everything including pvacms and tests
          - name: Linux (clang)
            os: ubuntu-latest
            cmp: clang
            configuration: default
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          # OSX - builds everything including pvacms and tests
          - name: macOS
            os: macos-latest
            cmp: clang
            configuration: default
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          # Windows - builds authnXXX, pvxcert, and tests (no pvacms)
          - name: Windows (vs2022)
            os: windows-2022
            cmp: vs2022
            configuration: default
            extra: "PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: "apt-get install"
      run: |
        sudo apt-get update
        sudo apt-get -y install libreadline-dev g++-mingw-w64-x86-64 cmake gdb qemu-system-x86 libssl-dev mingw-w64-x86-64-dev
      if: runner.os == 'Linux'

    - name: Install OpenSSL for MinGW
      run: |
        wget https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
        tar xzf openssl-${OPENSSL_VERSION}.tar.gz
        cd openssl-${OPENSSL_VERSION}
        ./Configure mingw64 --cross-compile-prefix=x86_64-w64-mingw32- --prefix=/usr/x86_64-w64-mingw32
        make -j$(nproc)
        sudo make install

        # Ensure the default library search paths contain unversioned import/static libs.
        SYSROOT=/usr/x86_64-w64-mingw32
        for lib in ssl crypto; do
          for kind in dll.a a; do
            tgt="$SYSROOT/lib/lib${lib}.${kind}"
            if [ ! -e "$tgt" ]; then
              cand=$(ls -1 "$SYSROOT"/lib/lib${lib}*.${kind} "$SYSROOT"/lib64/lib${lib}*.${kind} 2>/dev/null | head -n1 || true)
              if [ -n "$cand" ]; then
                sudo ln -sf "$cand" "$tgt"
              fi
            fi
          done
        done

        cd ..
        rm -rf openssl-${OPENSSL_VERSION}*
      if: runner.os == 'Linux' && matrix.cross == 'windows-x64-mingw'

    - name: Host Info
      run: openssl version -a
    - name: Automatic core dumper analysis
      uses: mdavidsaver/ci-core-dumper@master
    - name: Prepare and compile dependencies
      run: python .ci/cue.py prepare
    - name: Build libevent
      run: python .ci/cue.py exec python .ci-local/libevent.py
    - name: Build main module
      run: python .ci/cue.py build
    - name: otool
      if: ${{ always() && runner.os == 'macOS' }}
      run: otool -D -L -l bundle/usr/*/lib/*.dylib lib/*/*.dylib bin/*/pvxinfo
    - name: readelf
      if: ${{ always() && runner.os == 'Linux' }}
      run: find bundle/usr lib -name '*.so' -print0 | xargs -0 readelf -d bin/linux-*/pvxinfo
    - name: Host info
      run: python .ci/cue.py --add-path "{TOP}/bin/{EPICS_HOST_ARCH}" --add-path "{TOP}/bundle/usr/{EPICS_HOST_ARCH}/lib" exec pvxinfo -D
    - name: Test env setup
      run: echo "UBSAN_OPTIONS=log_path=$PWD/UBSAN:suppressions=$PWD/.ci-local/ubsan.supp:report_error_type=1:print_stacktrace=1" >> $GITHUB_ENV
    - name: Run main module tests
      run: python -m ci_core_dumper exec python .ci/cue.py -T 5M --add-path "{TOP}/bundle/usr/{EPICS_HOST_ARCH}/lib" test
    - name: Collect and show test results
      if: ${{ always() }}
      run: python .ci/cue.py test-results
    - name: Show UBSAN logs
      shell: bash
      if: ${{ always() }}
      run: |
        ret=0
        for ff in `find . -name 'UBSAN*'`
        do
          echo "==== $ff ===="
          cat "$ff"
          ret=1
        done
        exit $ret
    - name: CDT Check
      run: ./.ci-local/cdt-check.sh
      if: runner.os == 'Linux'
    - name: Troubleshoot
      if: ${{ always() }}
      shell: bash
      run: |
        if [ -d cfg ]; then
          grep . cfg/*
        fi
    - name: Upload tapfiles Artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: tapfiles ${{ matrix.name }}
        path: '**/O.*/*.tap'
        if-no-files-found: ignore

  # Cross-compilation builds (RTEMS, mingw)
  cross:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      SET: ${{ matrix.set || 'defaults' }}
      CMP: ${{ matrix.cmp }}
      BCFG: ${{ matrix.configuration }}
      BASE: ${{ matrix.base }}
      CI_CROSS_TARGETS: ${{ matrix.cross }}
      LIBEVENT_TAG: ${{ matrix.libevent }}
      TEST: ${{ matrix.test }}
      EXTRA: ${{ matrix.extra }}
      VV: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          # RTEMS - builds authnstd, pvxcert, tests (no authnkrb, authnldap, pvacms)
          - name: RTEMS5
            os: ubuntu-22.04
            cmp: gcc
            configuration: default
            cross: "RTEMS-pc686-qemu@5"

          # mingw - builds authnstd, authnkrb, authnldap, pvxcert, tests (no pvacms)
          - name: mingw64
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            cross: "windows-x64-mingw"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: "apt-get install"
      run: |
        sudo apt-get update
        sudo apt-get -y install libreadline-dev g++-mingw-w64-x86-64 cmake gdb qemu-system-x86 libssl-dev mingw-w64-x86-64-dev
      if: runner.os == 'Linux'

    - name: Install OpenSSL for MinGW
      run: |
        wget https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
        tar xzf openssl-${OPENSSL_VERSION}.tar.gz
        cd openssl-${OPENSSL_VERSION}
        ./Configure mingw64 --cross-compile-prefix=x86_64-w64-mingw32- --prefix=/usr/x86_64-w64-mingw32
        make -j$(nproc)
        sudo make install

        # Ensure the default library search paths contain unversioned import/static libs.
        SYSROOT=/usr/x86_64-w64-mingw32
        for lib in ssl crypto; do
          for kind in dll.a a; do
            tgt="$SYSROOT/lib/lib${lib}.${kind}"
            if [ ! -e "$tgt" ]; then
              cand=$(ls -1 "$SYSROOT"/lib/lib${lib}*.${kind} "$SYSROOT"/lib64/lib${lib}*.${kind} 2>/dev/null | head -n1 || true)
              if [ -n "$cand" ]; then
                sudo ln -sf "$cand" "$tgt"
              fi
            fi
          done
        done

        cd ..
        rm -rf openssl-${OPENSSL_VERSION}*
      if: runner.os == 'Linux' && matrix.cross == 'windows-x64-mingw'

    - name: Host Info
      run: openssl version -a
    - name: Automatic core dumper analysis
      uses: mdavidsaver/ci-core-dumper@master
    - name: Prepare and compile dependencies
      run: python .ci/cue.py prepare
    - name: Build libevent
      run: python .ci/cue.py exec python .ci-local/libevent.py
    - name: Build main module
      run: python .ci/cue.py build
    - name: readelf
      if: ${{ always() && runner.os == 'Linux' }}
      run: find bundle/usr lib -name '*.so' -print0 | xargs -0 readelf -d bin/linux-*/pvxinfo
    - name: Host info
      run: python .ci/cue.py --add-path "{TOP}/bin/{EPICS_HOST_ARCH}" --add-path "{TOP}/bundle/usr/{EPICS_HOST_ARCH}/lib" exec pvxinfo -D
    - name: Run main module tests
      # For RTEMS, we can't run tests natively - just build them
      # For mingw, tests can be run with wine or similar if available
      run: |
        if [ "${{ matrix.cross }}" = "RTEMS-pc686-qemu@5" ]; then
          # Just build tests for RTEMS, don't try to run them
          python -m ci_core_dumper exec python .ci/cue.py build tests
        else
          python -m ci_core_dumper exec python .ci/cue.py -T 5M --add-path "{TOP}/bundle/usr/{EPICS_HOST_ARCH}/lib" test
        fi
    - name: Collect and show test results
      if: ${{ always() }}
      run: python .ci/cue.py test-results
    - name: Troubleshoot
      if: ${{ always() }}
      shell: bash
      run: |
        if [ -d cfg ]; then
          grep . cfg/*
        fi
    - name: Upload tapfiles Artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: tapfiles ${{ matrix.name }}
        path: '**/O.*/*.tap'
        if-no-files-found: ignore
