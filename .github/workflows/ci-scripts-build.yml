# .github/workflows/ci-scripts-build.yml for pvxs-cms

name: PVXS CMS Build

on:
  push:
    paths-ignore:
      - .appveyor.yml
      - MANIFEST.in
  pull_request:
  workflow_dispatch:

env:
  _PVXS_ABORT_ON_CRIT: 1
  PVXS_LOG: pvxs.*=WARN,pvxs.stapling=DEBUG
  OPENSSL_VERSION: "3.1.4"

jobs:
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      SETUP_PATH: .ci-local:.ci
      SET: ${{ matrix.set || 'defaults' }}
      CMP: ${{ matrix.cmp }}
      BCFG: ${{ matrix.configuration }}
      BASE: ${{ matrix.base }}
      CI_CROSS_TARGETS: ${{ matrix.cross }}
      TEST: ${{ matrix.test }}
      EXTRA: ${{ matrix.extra }}
      VV: "1"
      CACHEDIR: ${{ github.workspace }}/.cache
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Native Linux EPICS 7.0-secure-pvaccess
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "7.0-secure-pvaccess"
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          - name: Native Linux (WError) EPICS 7.0-secure-pvaccess
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "7.0-secure-pvaccess"
            extra: "CMD_CPPFLAGS=-Werror PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"
            doc: 1

          - name: Native Linux (c++17) EPICS 7.0-secure-pvaccess
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "7.0-secure-pvaccess"
            extra: "CMD_CXXFLAGS=-std=c++17 PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          - name: Linux (gcc) EPICS R7.0.2
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "R7.0.2"
            set: "nofortify"
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES CMD_CPPFLAGS=\"-U_FORTIFY_SOURCE\""

          - name: Linux (gcc) EPICS 3.15
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "3.15"
            set: "nofortify"
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES CMD_CPPFLAGS=\"-U_FORTIFY_SOURCE\""

          - name: Linux (clang) EPICS 7.0-secure-pvaccess
            os: ubuntu-latest
            cmp: clang
            configuration: default
            base: "7.0-secure-pvaccess"
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          - name: macOS EPICS 7.0-secure-pvaccess
            os: macos-latest
            cmp: clang
            configuration: default
            base: "7.0-secure-pvaccess"
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          - name: Windows (vs2022) EPICS 7.0-secure-pvaccess
            os: windows-2022
            cmp: vs2022
            configuration: debug
            base: "7.0-secure-pvaccess"
            set: "windows"
            extra: "CMD_CXXFLAGS=\"-analysis /std:c++20\" PVXS_ENABLE_PVACMS=NO PVXS_ENABLE_KRB_AUTH=NO PVXS_ENABLE_LDAP_AUTH=NO"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: "apt-get install"
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get -y install \
            libreadline-dev \
            g++-mingw-w64-x86-64 \
            cmake gdb   \
            qemu-system-x86 \
            libssl-dev \
            libsqlite3-dev \
            mingw-w64-x86-64-dev \
            libevent-dev \
            libkrb5-dev \
            libldap2-dev

    - name: "brew install"
      if: runner.os == 'macOS'
      run: |
        brew install libevent krb5 openldap
        echo "LIBEVENT=$(brew --prefix)" >> "$GITHUB_ENV"

    - name: "vcpkg cache (libevent + openssl)"
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: c:/vcpkg-cache
        key: ${{ runner.os }}-vcpkg-v3

    - name: "vcpkg install (libevent + openssl)"
      if: runner.os == 'Windows'
      shell: bash
      run: |
        install -d c:/vcpkg-cache
        vcpkg install --binarysource="clear;files,c:/vcpkg-cache,readwrite" "libevent[openssl]" openssl
        echo "LIBEVENT=C:/vcpkg/installed/x64-windows" >> "$GITHUB_ENV"
        echo "OPENSSL=C:/vcpkg/installed/x64-windows" >> "$GITHUB_ENV"
    - name: Install OpenSSL for MinGW
      if: runner.os == 'Linux' && matrix.cross == 'windows-x64-mingw'
      run: |
        wget https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
        tar xzf openssl-${OPENSSL_VERSION}.tar.gz
        cd openssl-${OPENSSL_VERSION}
        ./Configure mingw64 --cross-compile-prefix=x86_64-w64-mingw32- --prefix=/usr/x86_64-w64-mingw32
        make -j$(nproc)
        sudo make install

        # Ensure the default library search paths contain unversioned import/static libs.
        # Some OpenSSL builds install only versioned names and/or to lib64.
        SYSROOT=/usr/x86_64-w64-mingw32
        for lib in ssl crypto; do
          for kind in dll.a a; do
            tgt="$SYSROOT/lib/lib${lib}.${kind}"
            if [ ! -e "$tgt" ]; then
              cand=$(ls -1 "$SYSROOT"/lib/lib${lib}*.${kind} "$SYSROOT"/lib64/lib${lib}*.${kind} 2>/dev/null | head -n1 || true)
              if [ -n "$cand" ]; then
                sudo ln -sf "$cand" "$tgt"
              fi
            fi
          done
        done

        cd ..
        rm -rf openssl-${OPENSSL_VERSION}*
    - name: Host Info
      run: openssl version -a

    - name: Automatic core dumper analysis
      uses: mdavidsaver/ci-core-dumper@master

    - name: Set Windows DLL paths
      if: runner.os == 'Windows'
      shell: bash
      run: |
        # Add DLL directories to PATH so test executables can find shared libraries
        echo "${CACHEDIR}/base-7.0-secure-pvaccess/bin/windows-x64-debug" >> $GITHUB_PATH
        echo "${CACHEDIR}/pvxs-tls/bin/windows-x64-debug" >> $GITHUB_PATH
        echo "${CACHEDIR}/pvxs-tls/lib/windows-x64-debug" >> $GITHUB_PATH
        echo "C:/vcpkg/installed/x64-windows/bin" >> $GITHUB_PATH

    - name: Prepare and compile dependencies
      run: python .ci/cue.py prepare

    - name: Build libevent
      if: runner.os != 'Windows'
      run: python .ci/cue.py exec python .ci-local/libevent.py

    - name: "Build pvxs-tls (non-Windows)"
      if: runner.os != 'Windows'
      run: python .ci/cue.py exec make -C ${CACHEDIR}/pvxs-tls

    - name: Build main module
      run: python .ci/cue.py build

    - name: Test env setup
      run: echo "UBSAN_OPTIONS=log_path=$PWD/UBSAN:suppressions=$PWD/.ci-local/ubsan.supp:report_error_type=1:print_stacktrace=1" >> $GITHUB_ENV

    - name: Test Logging Setup
      run: echo 'PVXS_LOG=pvxs.stapling=DEBUG' >> $GITHUB_ENV

    - name: Run main module tests
      if: runner.os != 'Windows'
      run: python -m ci_core_dumper exec python .ci/cue.py -T 10M --add-path "${CACHEDIR}/pvxs-tls/bundle/usr/{EPICS_HOST_ARCH}/lib" test

    - name: Collect and show test results
      if: ${{ always() && runner.os != 'Windows' }}
      run: python .ci/cue.py test-results

    - name: Show UBSAN logs
      if: ${{ always() }}
      shell: bash
      run: |
        ret=0
        for ff in `find . -name 'UBSAN*'`
        do
          echo "==== $ff ===="
          cat "$ff"
          ret=1
        done
        exit $ret

    - name: CDT Check
      run: ./.ci-local/cdt-check.sh
      if: runner.os == 'Linux'

    - name: Troubleshoot
      if: ${{ always() }}
      shell: bash
      run: |
        if [ -d cfg ]; then
          grep . cfg/*
        fi

    - name: Upload tapfiles Artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: tapfiles ${{ matrix.name }}
        path: '**/O.*/*.tap'
        if-no-files-found: ignore

  cross:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      SETUP_PATH: .ci-local:.ci
      SET: ${{ matrix.set || 'defaults' }}
      CMP: ${{ matrix.cmp }}
      BCFG: ${{ matrix.configuration }}
      BASE: ${{ matrix.base }}
      CI_CROSS_TARGETS: ${{ matrix.cross }}
      TEST: ${{ matrix.test }}
      EXTRA: ${{ matrix.extra }}
      VV: "1"
      CACHEDIR: ${{ github.workspace }}/.cache
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Cross mingw64 DLL
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "7.0-secure-pvaccess"
            set: "cross"
            cross: "windows-x64-mingw"
            extra: "PVXS_ENABLE_PVACMS=NO PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=NO"
          - name: Cross mingw64 static
            os: ubuntu-latest
            cmp: gcc
            configuration: static
            base: "7.0-secure-pvaccess"
            set: "cross"
            cross: "windows-x64-mingw"
            extra: "PVXS_ENABLE_PVACMS=NO PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=NO"
          - name: RTEMS5
            os: ubuntu-22.04
            cmp: gcc
            configuration: default
            base: "7.0-secure-pvaccess"
            set: "cross"
            cross: "RTEMS-pc686-qemu@5"
            extra: "PVXS_ENABLE_PVACMS=NO PVXS_ENABLE_KRB_AUTH=NO PVXS_ENABLE_LDAP_AUTH=NO"
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: "apt-get install"
      run: |
        sudo apt-get update
        sudo apt-get -y install libreadline-dev g++-mingw-w64-x86-64 cmake gdb qemu-system-x86 libssl-dev libsqlite3-dev mingw-w64-x86-64-dev libevent-dev libkrb5-dev libldap2-dev
      if: runner.os == 'Linux'

    - name: Install OpenSSL for MinGW
      run: |
        wget https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
        tar xzf openssl-${OPENSSL_VERSION}.tar.gz
        cd openssl-${OPENSSL_VERSION}
        ./Configure mingw64 --cross-compile-prefix=x86_64-w64-mingw32- --prefix=/usr/x86_64-w64-mingw32
        make -j$(nproc)
        sudo make install
        SYSROOT=/usr/x86_64-w64-mingw32
        for lib in ssl crypto; do
          for kind in dll.a a; do
            tgt="$SYSROOT/lib/lib${lib}.${kind}"
            if [ ! -e "$tgt" ]; then
              cand=$(ls -1 "$SYSROOT"/lib/lib${lib}*.${kind} "$SYSROOT"/lib64/lib${lib}*.${kind} 2>/dev/null | head -n1 || true)
              if [ -n "$cand" ]; then
                sudo ln -sf "$cand" "$tgt"
              fi
            fi
          done
        done
        cd ..
        rm -rf openssl-${OPENSSL_VERSION}*
      if: runner.os == 'Linux' && matrix.cross == 'windows-x64-mingw'

    - name: Host Info
      run: openssl version -a
    - name: Automatic core dumper analysis
      uses: mdavidsaver/ci-core-dumper@master
    - name: Prepare and compile dependencies
      run: python .ci/cue.py prepare

    - name: Clone pvxs-tls dependency
      run: |
        PVXS_DIR=${CACHEDIR}/pvxs-tls
        if [ ! -d "$PVXS_DIR" ]; then
          git clone --depth 5 --recursive --branch tls https://github.com/slac-epics/pvxs-tls.git "$PVXS_DIR"
        fi
        echo '-include $(TOP)/../RELEASE.local' > "$PVXS_DIR/configure/RELEASE"

    - name: Build libevent for pvxs (host + cross targets)
      run: python .ci/cue.py exec python .ci-local/pvxs-libevent-hook.py ${CACHEDIR}/pvxs-tls

    - name: Build pvxs-tls dependency
      run: |
        PVXS_DIR=${CACHEDIR}/pvxs-tls
        RELEASE_LOCAL=${CACHEDIR}/RELEASE.local
        if ! grep -q "^PVXS=" "$RELEASE_LOCAL" 2>/dev/null; then
          sed -i '/^EPICS_BASE=/i PVXS='"$PVXS_DIR" "$RELEASE_LOCAL"
        fi
        cp "$RELEASE_LOCAL" configure/RELEASE.local
        make -C "$PVXS_DIR" -j$(nproc)
    - name: Build main module
      run: python .ci/cue.py build
    - name: readelf
      if: ${{ always() && runner.os == 'Linux' }}
      run: find bundle/usr lib -name '*.so' -print0 | xargs -0 readelf -d bin/linux-*/pvxinfo
    - name: Host info
      run: python .ci/cue.py --add-path "{TOP}/bin/${EPICS_HOST_ARCH}" --add-path "{TOP}/bundle/usr/${EPICS_HOST_ARCH}/lib" exec pvxinfo -D
    - name: Run main module tests
      run: python -m ci_core_dumper exec python .ci/cue.py -T 5M --add-path "{TOP}/bundle/usr/${EPICS_HOST_ARCH}/lib" test
    - name: Collect and show test results
      if: ${{ always() }}
      run: python .ci/cue.py test-results
    - name: Troubleshoot
      if: ${{ always() }}
      shell: bash
      run: |
        if [ -d cfg ]; then
          grep . cfg/*
        fi
    - name: Upload tapfiles Artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: tapfiles ${{ matrix.name }}
        path: '**/O.*/*.tap'
        if-no-files-found: ignore
