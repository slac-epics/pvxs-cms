# .github/workflows/ci-scripts-build.yml for use with EPICS Base ci-scripts

name: PVXS CMS Build

on:
  push:
    paths-ignore:
      - .appveyor.yml
      - MANIFEST.in
  pull_request:
  workflow_dispatch:

env:
  _PVXS_ABORT_ON_CRIT: 1
  PVXS_LOG: pvxs.*=WARN
  OPENSSL_VERSION: "3.1.4"

jobs:
  build-deps:
    name: Build EPICS Base and PVXS
    runs-on: ubuntu-latest
    env:
      CMP: ${{ matrix.cmp }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_ver: "7.0-secure-pvaccess"
            pvxs_suffix: ""
            cmp: gcc
          - base_ver: "R7.0.2"
            pvxs_suffix: "-R7.0.2"
            cmp: gcc
          - base_ver: "3.15"
            pvxs_suffix: "-3.15"
            cmp: gcc
    steps:
    - uses: actions/checkout@v4
      with:
        repository: slac-epics/epics-base-tls
        path: epics-base-${{ matrix.base_ver }}
        submodules: true
    - name: Prepare EPICS Base ${{ matrix.base_ver }}
      run: |
        cd epics-base-${{ matrix.base_ver }}
        BASE=SELF SETUP_PATH=.ci-local:.ci python .ci/cue.py prepare
    - name: Build EPICS Base ${{ matrix.base_ver }}
      run: |
        cd epics-base-${{ matrix.base_ver }}
        BASE=SELF SETUP_PATH=.ci-local:.ci python .ci/cue.py build
    - uses: actions/checkout@v4
      with:
        repository: slac-epics/pvxs-tls
        path: pvxs${{ matrix.pvxs_suffix }}
        submodules: true
    - name: Configure PVXS to use EPICS Base ${{ matrix.base_ver }}
      run: |
        echo "EPICS_BASE=${{ github.workspace }}/epics-base-${{ matrix.base_ver }}" > pvxs${{ matrix.pvxs_suffix }}/configure/RELEASE.local
    - name: Prepare and build PVXS ${{ matrix.base_ver }}
      env:
        EPICS_BASE: ${{ github.workspace }}/epics-base-${{ matrix.base_ver }}
      run: |
        cd pvxs${{ matrix.pvxs_suffix }}
        BASE=SELF SETUP_PATH=.ci-local:.ci python .ci/cue.py prepare
        BASE=SELF SETUP_PATH=.ci-local:.ci python .ci/cue.py build
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: deps-${{ matrix.base_ver }}
        path: |
          epics-base-${{ matrix.base_ver }}/bin/**
          epics-base-${{ matrix.base_ver }}/lib/**
          epics-base-${{ matrix.base_ver }}/include/**
          pvxs${{ matrix.pvxs_suffix }}/bin/**
          pvxs${{ matrix.pvxs_suffix }}/lib/**
          pvxs${{ matrix.pvxs_suffix }}/include/**
        if-no-files-found: error

  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: build-deps
    env:
      SETUP_PATH: .ci-local
      SET: ${{ matrix.set || 'defaults' }}
      CMP: ${{ matrix.cmp }}
      BCFG: ${{ matrix.configuration }}
      BASE: ${{ matrix.base }}
      CI_CROSS_TARGETS: ${{ matrix.cross }}
      LIBEVENT_TAG: ${{ matrix.libevent }}
      TEST: ${{ matrix.test }}
      EXTRA: ${{ matrix.extra }}
      VV: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (gcc) EPICS 7.0-secure-pvaccess
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "7.0-secure-pvaccess"
            pvxs_suffix: ""
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          - name: Linux (gcc) EPICS R7.0.2
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "R7.0.2"
            pvxs_suffix: "-R7.0.2"
            set: "nofortify"
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES CMD_CPPFLAGS=\"-U_FORTIFY_SOURCE\""

          - name: Linux (gcc) EPICS 3.15
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "3.15"
            pvxs_suffix: "-3.15"
            set: "nofortify"
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES CMD_CPPFLAGS=\"-U_FORTIFY_SOURCE\""

          - name: Linux (clang) EPICS 7.0-secure-pvaccess
            os: ubuntu-latest
            cmp: clang
            configuration: default
            base: "7.0-secure-pvaccess"
            pvxs_suffix: ""
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          - name: macOS EPICS 7.0-secure-pvaccess
            os: macos-latest
            cmp: clang
            configuration: default
            base: "7.0-secure-pvaccess"
            pvxs_suffix: ""
            extra: "PVXS_ENABLE_PVACMS=YES PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

          - name: Windows (vs2022) EPICS 7.0-secure-pvaccess
            os: windows-2022
            cmp: vs2022
            configuration: default
            base: "7.0-secure-pvaccess"
            pvxs_suffix: ""
            extra: "PVXS_ENABLE_KRB_AUTH=YES PVXS_ENABLE_LDAP_AUTH=YES"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Download EPICS Base and PVXS artifacts
      uses: actions/download-artifact@v4
      with:
        name: deps-${{ matrix.base }}
        path: ..
    - name: Configure RELEASE.local
      run: |
        echo "EPICS_BASE=$(pwd)/../epics-base-${{ matrix.base }}" > configure/RELEASE.local
        echo "PVXS=$(pwd)/../pvxs${{ matrix.pvxs_suffix }}" >> configure/RELEASE.local
    - name: "apt-get install"
      run: |
        sudo apt-get update
        sudo apt-get -y install libreadline-dev g++-mingw-w64-x86-64 cmake gdb qemu-system-x86 libssl-dev mingw-w64-x86-64-dev
      if: runner.os == 'Linux'

    - name: Install OpenSSL for MinGW
      run: |
        wget https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
        tar xzf openssl-${OPENSSL_VERSION}.tar.gz
        cd openssl-${OPENSSL_VERSION}
        ./Configure mingw64 --cross-compile-prefix=x86_64-w64-mingw32- --prefix=/usr/x86_64-w64-mingw32
        make -j$(nproc)
        sudo make install
        SYSROOT=/usr/x86_64-w64-mingw32
        for lib in ssl crypto; do
          for kind in dll.a a; do
            tgt="$SYSROOT/lib/lib${lib}.${kind}"
            if [ ! -e "$tgt" ]; then
              cand=$(ls -1 "$SYSROOT"/lib/lib${lib}*.${kind} "$SYSROOT"/lib64/lib${lib}*.${kind} 2>/dev/null | head -n1 || true)
              if [ -n "$cand" ]; then
                sudo ln -sf "$cand" "$tgt"
              fi
            fi
          done
        done
        cd ..
        rm -rf openssl-${OPENSSL_VERSION}*
      if: runner.os == 'Linux' && matrix.cross == 'windows-x64-mingw'

    - name: Host Info
      run: openssl version -a
    - name: Automatic core dumper analysis
      uses: mdavidsaver/ci-core-dumper@master
    - name: Prepare and compile dependencies
      run: python .ci/cue.py prepare
    - name: Build libevent
      run: python .ci/cue.py exec python .ci-local/libevent.py
    - name: Build main module
      run: python .ci/cue.py build
    - name: otool
      if: ${{ always() && runner.os == 'macOS' }}
      run: otool -D -L -l bundle/usr/*/lib/*.dylib lib/*/*.dylib bin/*/pvxinfo
    - name: readelf
      if: ${{ always() && runner.os == 'Linux' }}
      run: find bundle/usr lib -name '*.so' -print0 | xargs -0 readelf -d bin/linux-*/pvxinfo
    - name: Host info
      run: python .ci/cue.py --add-path "{TOP}/bin/{EPICS_HOST_ARCH}" --add-path "{TOP}/bundle/usr/{EPICS_HOST_ARCH}/lib" exec pvxinfo -D
    - name: Test env setup
      run: echo "UBSAN_OPTIONS=log_path=$PWD/UBSAN:suppressions=$PWD/.ci-local/ubsan.supp:report_error_type=1:print_stacktrace=1" >> $GITHUB_ENV
    - name: Run main module tests
      run: python -m ci_core_dumper exec python .ci/cue.py -T 5M --add-path "{TOP}/bundle/usr/{EPICS_HOST_ARCH}/lib" test
    - name: Collect and show test results
      if: ${{ always() }}
      run: python .ci/cue.py test-results
    - name: Show UBSAN logs
      shell: bash
      if: ${{ always() }}
      run: |
        ret=0
        for ff in `find . -name 'UBSAN*'`
        do
          echo "==== $ff ===="
          cat "$ff"
          ret=1
        done
        exit $ret
    - name: CDT Check
      run: ./.ci-local/cdt-check.sh
      if: runner.os == 'Linux'
    - name: Troubleshoot
      if: ${{ always() }}
      shell: bash
      run: |
        if [ -d cfg ]; then
          grep . cfg/*
        fi
    - name: Upload tapfiles Artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: tapfiles ${{ matrix.name }}
        path: '**/O.*/*.tap'
        if-no-files-found: ignore

  cross:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: build-deps
    env:
      SETUP_PATH: .ci-local
      SET: ${{ matrix.set || 'defaults' }}
      CMP: ${{ matrix.cmp }}
      BCFG: ${{ matrix.configuration }}
      BASE: ${{ matrix.base }}
      CI_CROSS_TARGETS: ${{ matrix.cross }}
      LIBEVENT_TAG: ${{ matrix.libevent }}
      TEST: ${{ matrix.test }}
      EXTRA: ${{ matrix.extra }}
      VV: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: RTEMS5
            os: ubuntu-22.04
            cmp: gcc
            configuration: default
            base: "7.0-secure-pvaccess"
            pvxs_suffix: ""
            cross: "RTEMS-pc686-qemu@5"

          - name: mingw64
            os: ubuntu-latest
            cmp: gcc
            configuration: default
            base: "7.0-secure-pvaccess"
            pvxs_suffix: ""
            cross: "windows-x64-mingw"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Download EPICS Base and PVXS artifacts
      uses: actions/download-artifact@v4
      with:
        name: deps-${{ matrix.base }}
        path: ..
    - name: Configure RELEASE.local
      run: |
        echo "EPICS_BASE=$(pwd)/../epics-base-${{ matrix.base }}" > configure/RELEASE.local
        echo "PVXS=$(pwd)/../pvxs${{ matrix.pvxs_suffix }}" >> configure/RELEASE.local
    - name: "apt-get install"
      run: |
        sudo apt-get update
        sudo apt-get -y install libreadline-dev g++-mingw-w64-x86-64 cmake gdb qemu-system-x86 libssl-dev mingw-w64-x86-64-dev
      if: runner.os == 'Linux'

    - name: Install OpenSSL for MinGW
      run: |
        wget https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
        tar xzf openssl-${OPENSSL_VERSION}.tar.gz
        cd openssl-${OPENSSL_VERSION}
        ./Configure mingw64 --cross-compile-prefix=x86_64-w64-mingw32- --prefix=/usr/x86_64-w64-mingw32
        make -j$(nproc)
        sudo make install
        SYSROOT=/usr/x86_64-w64-mingw32
        for lib in ssl crypto; do
          for kind in dll.a a; do
            tgt="$SYSROOT/lib/lib${lib}.${kind}"
            if [ ! -e "$tgt" ]; then
              cand=$(ls -1 "$SYSROOT"/lib/lib${lib}*.${kind} "$SYSROOT"/lib64/lib${lib}*.${kind} 2>/dev/null | head -n1 || true)
              if [ -n "$cand" ]; then
                sudo ln -sf "$cand" "$tgt"
              fi
            fi
          done
        done
        cd ..
        rm -rf openssl-${OPENSSL_VERSION}*
      if: runner.os == 'Linux' && matrix.cross == 'windows-x64-mingw'

    - name: Host Info
      run: openssl version -a
    - name: Automatic core dumper analysis
      uses: mdavidsaver/ci-core-dumper@master
    - name: Prepare and compile dependencies
      run: python .ci/cue.py prepare
    - name: Build libevent
      run: python .ci/cue.py exec python .ci-local/libevent.py
    - name: Build main module
      run: python .ci/cue.py build
    - name: readelf
      if: ${{ always() && runner.os == 'Linux' }}
      run: find bundle/usr lib -name '*.so' -print0 | xargs -0 readelf -d bin/linux-*/pvxinfo
    - name: Host info
      run: python .ci/cue.py --add-path "{TOP}/bin/{EPICS_HOST_ARCH}" --add-path "{TOP}/bundle/usr/{EPICS_HOST_ARCH}/lib" exec pvxinfo -D
    - name: Run main module tests
      run: |
        if [ "${{ matrix.cross }}" = "RTEMS-pc686-qemu@5" ]; then
          python -m ci_core_dumper exec python .ci/cue.py build tests
        else
          python -m ci_core_dumper exec python .ci/cue.py -T 5M --add-path "{TOP}/bundle/usr/{EPICS_HOST_ARCH}/lib" test
        fi
    - name: Collect and show test results
      if: ${{ always() }}
      run: python .ci/cue.py test-results
    - name: Troubleshoot
      if: ${{ always() }}
      shell: bash
      run: |
        if [ -d cfg ]; then
          grep . cfg/*
        fi
    - name: Upload tapfiles Artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: tapfiles ${{ matrix.name }}
        path: '**/O.*/*.tap'
        if-no-files-found: ignore
