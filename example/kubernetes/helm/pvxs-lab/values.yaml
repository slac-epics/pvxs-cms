dockerRegistry: "ghcr.io"
dockerUsername: "slac-epics"

images:
  idm:
    name: "idm"
    tag: "latest"
  internet:
    name: "internet"
    tag: "latest"
  it:
    name: "idm"
    tag: "latest"
  testioc:
    name: "testioc"
    tag: "latest"
  tstioc:
    name: "tstioc"
    tag: "latest"
  ml:
    name: "ml"
    tag: "latest"
  mlIoc:
    name: "ml-ioc"
    tag: "latest"
  gateway:
    name: "gateway"
    tag: "latest"
  lab:
    name: "lab"
    tag: "latest"
  csStudio:
    name: "cs-studio"
    tag: "latest"

imagePullPolicy: IfNotPresent

idm:
  replicas: 1
  service:
    name: "idm"
    udpPort: 88
    tcpPort: 749
    pwdPort: 464

  expose:
    nodePortUdp: 30088
    nodePortTcp: 30049

  debug:
    enabled: false
    logLevel: "pvxs.*=INFO"
  persistence:
    enabled: true
    size: 64Mi
    dataSize: 256Mi
    storageClassName: ""

internet:
  replicas: 1
  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

it:
  replicas: 1
  debug:
    enabled: false
    logLevel: "pvxs.*=INFO"
  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

ml:
  replicas: 1
  debug:
    enabled: false
    logLevel: "pvxs.*=INFO"
  persistence:
    enabled: true
    size: 64Mi
    dataSize: 256Mi
    storageClassName: ""

mlIoc:
  replicas: 1
  debug:
    enabled: false
    logLevel: "pvxs.*=INFO"
  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

mlGateway:
  replicas: 1
  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

  config: |
    {
      "version": 2,
      "readOnly": false,
      "clients": [
        {
          "name": "ml-local",
          "autoaddrlist": false,
          "addrlist": "{{ include "pvxs-lab.mlService" . }} {{ include "pvxs-lab.mlIocService" . }}",
          "tls_keychain": "/home/gateway/.config/pva/1.5/gateway.p12"
        }
      ],
      "servers": [
        {
          "name": "internet",
          "clients": ["ml-local"],
          "acf_client": "ml-local",
          "statusprefix": "GW:STS:",
          "autoaddrlist": false,
          "addrlist": "{{ include "pvxs-lab.mlGatewayService" . }} {{ include "pvxs-lab.mlService" . }}",
          "tls_keychain": "/home/gateway/.config/pva/1.5/gateway.p12",
          "serverport": "5075",
          "EPICS_PVAS_TLS_PORT": "5076",
          "bcastport": "5076",
          "access": "gateway.acf",
          "pvlist": "internet.pvlist"
        },
        {
          "name": "cross-zone",
          "clients": ["ml-local"],
          "statusprefix": "GW:STS:",
          "autoaddrlist": false,
          "addrlist": "{{ include "pvxs-lab.mlGatewayService" . }}-xgw",
          "tls_keychain": "/home/gateway/.config/pva/1.5/gateway.p12",
          "serverport": "5175",
          "EPICS_PVAS_TLS_PORT": "5176",
          "bcastport": "5176",
          "access": "gateway.acf",
          "pvlist": "cross-zone.pvlist"
        },
        {
          "name": "downstream_status",
          "clients": [],
          "interface": ["127.0.0.1"],
          "statusprefix": "GW:STS:"
        }
      ]
    }

  internetPvlist: |
    ml:.* ALLOW

  crossZonePvlist: |
    ml:.* ALLOW
    CERT:CLUSTER(?::.*)? ALLOW CERT_CREATE


testioc:
  replicas: 1
  debug:
    enabled: false
    logLevel: "pvxs.*=INFO"
  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

tstioc:
  replicas: 1
  debug:
    enabled: false
    logLevel: "pvxs.*=INFO"
  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

gateway:
  replicas: 1
  hostNetwork: false    # for NodePort mode
  # externalInterface: 123.45.6.7   # egress if defined
  separate_server_keychain: false

  expose: {}

  config: |
    {
      "version": 2,
      "readOnly": false,
      "clients": [
        {
          "name": "local",
          "autoaddrlist": false,
          "addrlist": "{{ include "pvxs-lab.pvacmsService" . }} {{ include "pvxs-lab.testiocService" . }} {{ include "pvxs-lab.tstiocService" . }}",
          "tls_keychain": "/home/gateway/.config/pva/1.5/gateway.p12"
        }
      ],
      "servers": [
        {
          "name": "internet",
          "clients": ["local"],
          "acf_client": "local",
          "statusprefix": "GW:STS:",
          "autoaddrlist": false,
          "addrlist": "{{ include "pvxs-lab.gatewayService" . }} {{ include "pvxs-lab.pvacmsService" . }}",
          "tls_keychain": "/home/gateway/.config/pva/1.5/gateway{{ if .Values.gateway.separate_server_keychain }}{{ "S" }}{{ end }}.p12",
          "serverport": "5075",
          "EPICS_PVAS_TLS_PORT": "5076",
          "bcastport": "5076",
          "access": "gateway.acf",
          "pvlist": "internet.pvlist"
        },
        {
          "name": "cross-zone",
          "clients": ["local"],
          "statusprefix": "GW:STS:",
          "autoaddrlist": false,
          "addrlist": "{{ include "pvxs-lab.gatewayService" . }}-xgw {{ include "pvxs-lab.pvacmsService" . }}",
          "tls_keychain": "/home/gateway/.config/pva/1.5/gateway{{ if .Values.gateway.separate_server_keychain }}{{ "S" }}{{ end }}.p12",
          "serverport": "5175",
          "EPICS_PVAS_TLS_PORT": "5176",
          "bcastport": "5176",
          "access": "gateway.acf",
          "pvlist": "cross-zone.pvlist"
        },
        {
          "name": "downstream_status",
          "clients": [],
          "interface": ["127.0.0.1"],
          "statusprefix": "GW:STS:"
        }
      ]
    }

  internetPvlist: |
    test:.* ALLOW
    tst:.* ALLOW
    test:spec ALLOW SPECIAL
    CERT:CREATE(?::.*)? ALLOW CERT_CREATE
    CERT:STATUS(?::.*)? ALLOW CERT_STATUS

  crossZonePvlist: |
    test:.* ALLOW
    tst:.* ALLOW
    test:spec ALLOW SPECIAL
    CERT:CLUSTER(?::.*)? ALLOW CERT_CREATE

  debug:
    enabled: false
    logLevel: "p4p.gw=DEBUG,pvxs.*=DEBUG"

  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

csStudioLab:
  replicas: 1
  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

csStudioMl:
  replicas: 1
  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

csStudioInternet:
  replicas: 1
  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

lab:
  image: "lab:latest"
  replicas: 1

  persistence:
    enabled: true
    size: 64Mi
    storageClassName: ""

  keepalive:
    enabled: true
    command: ["/bin/sh", "-lc"]
    args: ["sleep infinity"]

# Internal PVAccess ports (PVXS/P4P defaults)
ports:
  pvaTcp: 5075
  pvaUdp: 5076
  pvaTls: 5076
  exposePvaTls: true


