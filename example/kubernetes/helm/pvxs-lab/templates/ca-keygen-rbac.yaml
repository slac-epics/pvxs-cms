apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-ca-keygen
  labels:
    {{- include "pvxs-lab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-ca-keygen
  labels:
    {{- include "pvxs-lab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-ca-keygen
  labels:
    {{- include "pvxs-lab.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
subjects:
  - kind: ServiceAccount
    name: {{ include "pvxs-lab.fullname" . }}-ca-keygen
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pvxs-lab.fullname" . }}-ca-keygen
