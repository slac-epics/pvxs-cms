apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pvxs-lab.mlGatewayService" . }}
  labels:
    {{- include "pvxs-lab.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mlGateway.replicas }}
  selector:
    matchLabels:
      app: ml-gateway
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: ml-gateway
        release: {{ .Release.Name }}
    spec:
      initContainers:
        - name: gateway-conf-init
          image: {{ include "pvxs-lab.image" (dict "Values" .Values "name" .Values.images.gateway.name "tag" .Values.images.gateway.tag) | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -e
              install -d -m 0755 -o gateway -g gateway /work
              install -m 0644 -o gateway -g gateway /conf-src/gateway.conf /work/gateway.conf
              install -m 0644 -o gateway -g gateway /conf-src/internet.pvlist /work/internet.pvlist
              install -m 0644 -o gateway -g gateway /conf-src/cross-zone.pvlist /work/cross-zone.pvlist
          volumeMounts:
            - name: gw-conf-src
              mountPath: /conf-src
              readOnly: true
            - name: gw-conf
              mountPath: /work
      containers:
        - name: ml-gateway
          image: {{ include "pvxs-lab.image" (dict "Values" .Values "name" .Values.images.gateway.name "tag" .Values.images.gateway.tag) | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: pva-tcp
              containerPort: {{ .Values.ports.pvaTcp }}
              protocol: TCP
            - name: pva-tls
              containerPort: {{ .Values.ports.pvaTls }}
              protocol: TCP
            - name: pva-udp
              containerPort: {{ .Values.ports.pvaUdp }}
              protocol: UDP
            - name: xgw-tcp
              containerPort: 5175
              protocol: TCP
            - name: xgw-udp
              containerPort: 5176
              protocol: UDP
          env:
            - name: EPICS_PVA_TLS_KEYCHAIN
              value: "/home/gateway/.config/pva/1.5/gateway.p12"
            - name: EPICS_PVAS_TLS_KEYCHAIN
              value: "/home/gateway/.config/pva/1.5/gateway.p12"
          volumeMounts:
            - name: gw-conf
              mountPath: /home/gateway/gateway.conf
              subPath: gateway.conf
            - name: gw-conf
              mountPath: /home/gateway/internet.pvlist
              subPath: internet.pvlist
            - name: gw-conf
              mountPath: /home/gateway/cross-zone.pvlist
              subPath: cross-zone.pvlist
            - name: pva-config
              mountPath: /home/gateway/.config/pva/1.5
      volumes:
        - name: gw-conf-src
          configMap:
            name: {{ include "pvxs-lab.mlGatewayService" . }}-conf
        - name: gw-conf
          emptyDir: {}
        - name: pva-config
          {{- if .Values.mlGateway.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "pvxs-lab.fullname" . }}-ml-gateway-pva
          {{- else }}
          emptyDir: {}
          {{- end }}
