apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pvxs-lab.internetService" . }}
  labels:
    {{- include "pvxs-lab.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.internet.replicas }}
  selector:
    matchLabels:
      app: internet
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: internet
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: internet
          image: {{ include "pvxs-lab.image" (dict "Values" .Values "name" .Values.images.internet.name "tag" .Values.images.internet.tag) | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/bin/bash", "-lc"]
          args: ["sleep infinity"]
          env:
            - name: EPICS_AUTH_KRB_REALM
              value: "EPICS.ORG"
            - name: KRB5_CONFIG
              value: /etc/krb5.conf
            - name: KRB5_KDC_PROFILE
              value: /etc/krb5kdc/kdc.conf
            - name: KADMIN_ADMIN_SERVER
              value: '{{ include "pvxs-lab.fullname" . }}-idm:{{ .Values.idm.service.tcpPort }}'
          volumeMounts:
            - name: pva-config
              mountPath: /home/guest/.config/pva/1.5
              subPath: guest
            - name: pva-config
              mountPath: /home/operator/.config/pva/1.5
              subPath: operator
            - name: krb5-conf
              mountPath: /etc/krb5.conf
              subPath: krb5.conf
              readOnly: true
      volumes:
        - name: pva-config
          {{- if .Values.internet.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "pvxs-lab.fullname" . }}-internet-pva
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: krb5-conf
          configMap:
            name: {{ include "pvxs-lab.fullname" . }}-krb5
