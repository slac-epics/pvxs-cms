apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-pvacms-acf
  labels:
    {{- include "pvxs-lab.labels" . | nindent 4 }}
data:
  pvacms.acf: |-
    UAG(CMS_ADMIN) {admin}

    ASG(DEFAULT) {
        RULE(0,READ)
        RULE(1,WRITE) {
            UAG(CMS_ADMIN)
        }
    }
