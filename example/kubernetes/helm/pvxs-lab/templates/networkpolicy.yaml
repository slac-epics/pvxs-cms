# 1) PVACMS ingress: allow from any pod in this Helm release
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-idm-ingress
spec:
  podSelector:
    matchLabels:
      app: idm
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              release: {{ .Release.Name }}

---
# 2) IOC ingress: allow ONLY from lab and gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-ioc-ingress
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["testioc","tstioc"]
    matchLabels:
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: lab
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: cs-studio-lab
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: gateway
              release: {{ .Release.Name }}

---
# 3) Gateway ingress: allow from internet, ml-gateway, and all lab-internal pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-gateway-ingress-deny
spec:
  podSelector:
    matchLabels:
      app: gateway
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: internet
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: ml-gateway
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: idm
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: it
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: lab
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: cs-studio-lab
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: cs-studio-ml
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: cs-studio-internet
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: ml
              release: {{ .Release.Name }}

---
# 4) Internet egress: allow ONLY to gateway/ml-gateway/idm(kerberos) + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-internet-egress
spec:
  podSelector:
    matchLabels:
      app: internet
      release: {{ .Release.Name }}
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: gateway
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: ml-gateway
              release: {{ .Release.Name }}
    - to:
        - podSelector:
            matchLabels:
              app: idm
              release: {{ .Release.Name }}
      ports:
        - protocol: UDP
          port: 88
        - protocol: TCP
          port: 749
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
