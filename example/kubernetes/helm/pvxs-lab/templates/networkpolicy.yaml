        - podSelector:
            matchLabels:
              app: ml
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: cs-studio-ml
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: gateway
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: idm
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: lab
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: cs-studio-lab
              release: {{ .Release.Name }}
        - podSelector:
