              app: cs-studio-internet
              release: {{ .Release.Name }}

---
# 11) Lab egress: allow ONLY to idm/it/testioc/tstioc/ml-gateway + DNS
#    This blocks lab -> gateway (by Service name, Pod IP, or hostNetwork IP).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-lab-egress
spec:
  podSelector:
    matchLabels:
      app: lab
      release: {{ .Release.Name }}
  policyTypes: ["Egress"]
  egress:
    # Allow to the four internal services + ml-gateway for cross-zone PVs
    - to:
        - podSelector:
            matchLabels:
              app: idm
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: it
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: testioc
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: tstioc
              release: {{ .Release.Name }}
        - podSelector:
            matchLabels:
              app: ml-gateway
              release: {{ .Release.Name }}
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

