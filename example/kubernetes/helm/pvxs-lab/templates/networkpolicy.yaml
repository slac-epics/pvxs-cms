# NETWORK ZONE ISOLATION. Strategy: ingress access control only
#
# 1-a) Lab PVACMS & KDC ingress:
#          Allow EVERYTHING from lab, lab-iocs, it, gateway.
#          Allow KDC (88/UDP, 749/TCP) from internet and ml zones.
#          Allow cross-zone PVACMS replication (5175/TCP) from ml-gateway.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-lab-pvacms-kdc-ingress
spec:
  podSelector:
    matchLabels:
      app: idm
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    # Rule 1: full access from lab-zone peers + it + gateway
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["lab", "cs-studio-lab", "it", "gateway", "testioc", "tstioc"]
            matchLabels:
              release: {{ .Release.Name }}

    # Rule 2: KDC from ml and internet zones
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["ml", "cs-studio-ml", "internet", "cs-studio-internet"]
            matchLabels:
              release: {{ .Release.Name }}
      ports:
        - protocol: UDP
          port: 88
        - protocol: TCP
          port: 749

    # Rule 3: cross-zone PVACMS sync from ml-gateway
    - from:
        - podSelector:
            matchLabels:
              app: ml-gateway
              release: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5175

---
# 1-b) ML PVACMS ingress:
#          Allow EVERYTHING from ml, ml-ioc, and ml-gateway
#          Allow cross-zone PVACMS replication (5175/TCP) from gateway.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-ml-pvacms-ingress
spec:
  podSelector:
    matchLabels:
      app: ml
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    # Rule 1: full access from ml-zone peers + ml-gateway
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["ml", "cs-studio-ml", "ml-gateway", "ml-ioc"]
            matchLabels:
              release: {{ .Release.Name }}
    # Rule 2: cross-zone PVACMS sync from ml-gateway
    - from:
        - podSelector:
            matchLabels:
              app: gateway
              release: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5175

---
# 1-c) IT PVACMS ingress: allow ONLY from idm, and lab
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-it-pvacms-ingress
spec:
  podSelector:
    matchLabels:
      app: it
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["idm", "lab", "cs-studio-lab", "testioc", "tstioc"]
            matchLabels:
              release: {{ .Release.Name }}
    # Rule 3: cross-zone PVACMS sync from ml-gateway
    - from:
        - podSelector:
            matchLabels:
              app: ml-gateway
              release: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5175

---
# 2-a) Lab IOC ingress: allow ONLY from lab, and gateway (not IT)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-lab-ioc-ingress
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["testioc", "tstioc"]
    matchLabels:
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["lab", "cs-studio-lab", "gateway"]
            matchLabels:
              release: {{ .Release.Name }}

---
# 2-b) ML IOC ingress: allow ONLY from ml, cs-studio-ml, and ml-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-ml-ioc-ingress
spec:
  podSelector:
    matchLabels:
      app: ml-ioc
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["ml", "cs-studio-ml", "ml-gateway"]
            matchLabels:
              release: {{ .Release.Name }}

---
# 3-a) Lab Gateway ingress: allow from all non-lab, and non-gateway pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-lab-gateway-ingress
spec:
  podSelector:
    matchLabels:
      app: gateway
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: NotIn
                values: ["lab", "cs-studio-lab", "idm", "gateway", "testioc", "tstioc", "it", "ml-gateway"]
            matchLabels:
              release: {{ .Release.Name }}

---
# 3-b) ML Gateway ingress: allow from all non-ML, and non-gateway pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pvxs-lab.fullname" . }}-ml-gateway-ingress
spec:
  podSelector:
    matchLabels:
      app: ml-gateway
      release: {{ .Release.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: NotIn
                values: ["ml", "cs-studio-ml", "ml-gateway", "ml-ioc", "gateway"]
            matchLabels:
              release: {{ .Release.Name }}

