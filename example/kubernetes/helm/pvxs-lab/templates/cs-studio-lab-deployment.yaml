apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pvxs-lab.csStudioLabService" . }}
  labels:
    {{- include "pvxs-lab.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.csStudioLab.replicas }}
  selector:
    matchLabels:
      app: cs-studio-lab
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: cs-studio-lab
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: cs-studio-lab
          image: {{ include "pvxs-lab.image" (dict "Values" .Values "name" .Values.images.csStudio.name "tag" .Values.images.csStudio.tag) | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              # Fix: UDP PVA search to ClusterIP services doesn't work in k8s.
              # Move PVACMS service from ADDR_LIST (UDP) to NAME_SERVERS (TCP).
              sed -i 's|EPICS_PVA_ADDR_LIST="pvxs-lab-pvacms |EPICS_PVA_ADDR_LIST="|' /home/operator/.operator_bashrc
              sed -i 's|EPICS_PVA_NAME_SERVERS="|EPICS_PVA_NAME_SERVERS="{{ include "pvxs-lab.pvacmsService" . }}:5075 |' /home/operator/.operator_bashrc
              exec /usr/bin/supervisord -c /etc/supervisor/supervisord.conf
          volumeMounts:
            - name: pva-config
              mountPath: /home/operator/.config/pva/1.5
              subPath: operator
            - name: pva-config
              mountPath: /home/guest/.config/pva/1.5
              subPath: guest
            - name: krb5-conf
              mountPath: /etc/krb5.conf
              subPath: krb5.conf
              readOnly: true
          env:
            - name: EPICS_AUTH_KRB_REALM
              value: "EPICS.ORG"
          ports:
            - name: novnc
              containerPort: 8080
      volumes:
        - name: pva-config
          {{- if .Values.csStudioLab.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "pvxs-lab.fullname" . }}-cs-studio-lab-pva
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: krb5-conf
          configMap:
            name: {{ include "pvxs-lab.fullname" . }}-krb5
