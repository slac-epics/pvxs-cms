[program:pvacms]

; ---------------------------------------------------------------------------
; Environment:
;   KRB5_KTNAME / KRB5_CLIENT_KTNAME    Kerberos keytab used by pvacms to
;                                        obtain service credentials for the
;                                        pvacms/cluster@EPICS.ORG principal.
;   EPICS_AUTH_KRB_REALM                Default realm assumed for unqualified
;                                        principals in Kerberos auth flows.
;                                        Assumes network allows access to KDC.
;   EPICS_PVACMS_CLUSTER_NAME_SERVERS   Cross zone PVACMS cluster replication gateway.
; ---------------------------------------------------------------------------
environment=
    KRB5_KTNAME="/home/idm/.config/krb5/pvacms.keytab",
    KRB5_CLIENT_KTNAME="/home/idm/.config/krb5/pvacms.keytab",
    EPICS_AUTH_KRB_REALM="EPICS.ORG",
    EPICS_PVACMS_CLUSTER_NAME_SERVERS="pvxs-lab-ml-gateway-xgw:5175"

; ---------------------------------------------------------------------------
; Command:
;   --cluster-mode                      Run PVACMS as a cluster node (enables
;                                        peer discovery, SYNC, leader election).
;   --cluster-discovery-timeout 30      Wait 30s for cluster discovery because
;                                        discovery via gateway is slower than normal.
;   --cert-auth-keychain <file>         Path to the CA keychain (.p12)
;                                        created in the ca-keygen job.
;   --acf <file>                        ACF file controlling who may perform
;                                        administrative cert operations.
;   --admin-keychain-ensure             Generate admin keychain to configure admin user.
;
;   `exec` replaces the shell PID so stopsignal=TERM reaches pvacms directly.
; ---------------------------------------------------------------------------
command=/bin/sh -c 'exec /opt/epics/pvxs-cms/bin/$(/opt/epics/epics-base/startup/EpicsHostArch)/pvacms --cluster-mode --cluster-discovery-timeout 30 --cluster-skip-peer-identity-check --cert-auth-keychain /etc/pvacms/cert_auth.p12 --acf /etc/pvacms/pvacms.acf --admin-keychain /home/idm/.config/pva/1.5/admin.p12 --admin-keychain-ensure admin -v'
; user=idm
autostart=true
autorestart=true

; Send logs to container stdout/stderr
stdout_logfile=/proc/1/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/proc/1/fd/2
stderr_logfile_maxbytes=0
stopsignal=TERM
stopasgroup=true
killasgroup=true
